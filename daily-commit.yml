name: Daily Commit

on:
  schedule:
    - cron: '0 4 * * *'   # 9:30 AM IST
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "sidharth1606"
          git config user.email "sidharth1606@users.noreply.github.com"

      - name: Daily commit
        run: |
          COUNT=$((RANDOM % 4 + 1))
          for i in $(seq 1 $COUNT); do
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) — log $i" >> activity.log
            git add activity.log
            git commit -m "docs: daily log $(date +%Y-%m-%d) [$i]"
          done

      - name: Push
        run: git push origin main
